name: Job Alert Louisville KY

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check-jobs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run job alert
        env:
          EMAIL_REMITENTE:  ${{ secrets.EMAIL_REMITENTE }}
          EMAIL_CONTRASENA: ${{ secrets.EMAIL_CONTRASENA }}
          EMAIL_DESTINO:    ${{ secrets.EMAIL_DESTINO }}
          ADZUNA_APP_ID:    ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:   ${{ secrets.ADZUNA_APP_KEY }}
        run: python job_alert_louisville.py

      - name: Guardar historial de empleos vistos
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "Update seen jobs"
          git push
